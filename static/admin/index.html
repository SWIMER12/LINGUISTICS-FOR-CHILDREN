<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Панель управления</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🔐</div>
      <h1>Панель управления</h1>
      <p>Введите данные для входа</p>
    </div>

    <div id="login-alert" class="alert" style="display:none" role="alert"></div>

    <form id="login-form" novalidate aria-label="Форма входа">
      <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;margin-top:8px">
        Войти
      </button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin-login.js"></script>
</body>
</html>
